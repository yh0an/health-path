services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthpath
      POSTGRES_PASSWORD: healthpath_secret
      POSTGRES_DB: healthpath
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U healthpath']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - '4800:4800'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://healthpath:healthpath_secret@db:5432/healthpath
      PORT: 4800
      CLIENT_URL: http://localhost:5373
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - '5373:5373'
    depends_on:
      - server

volumes:
  postgres_data:
  uploads_data:
